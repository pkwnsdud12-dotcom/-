name: Build APK

# 코드를 올리면(push) 자동으로 실행됩니다. 수동 실행 버튼도 추가.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # GitHub 사이트에서 "Run workflow" 버튼으로 수동 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1) 코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v4

      # 2) 자바(JDK 17) 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3) Gradle Wrapper 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 4) Gradle Wrapper JAR 이 없으면 생성 (휴대폰 업로드 시 누락 대비)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Ensure gradle wrapper jar
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "wrapper jar 없음 -> gradle wrapper 생성"
            gradle wrapper --gradle-version 8.7
          fi

      # 5) 디버그 APK 빌드 (서명 불필요, 바로 폰에 설치 가능)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 6) 만들어진 APK 업로드 (다운로드 가능하게)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iPhoneXSCam-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
